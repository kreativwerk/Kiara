# Kiara online betreiben: App + Caddy (automatisches HTTPS via Let's Encrypt).
#
#   1. Domain auf die Server-IP zeigen lassen (DNS A-Record)
#   2. .env anlegen:  KIARA_DOMAIN=kiara.example.de
#   3. docker compose up -d
#
# Ohne KIARA_DOMAIN lauscht Caddy auf "localhost" (Selbsttest).
#
# ---------------------------------------------------------------------------
# Zweite Firma (komplett getrennte Instanz: eigene Domain, eigene Daten,
# eigenes Passwort) - in der .env zusätzlich setzen:
#
#   KIARA_DOMAIN2=belege.zweitfirma.de
#   CADDYFILE=Caddyfile.zwei
#   COMPOSE_PROFILES=zweitfirma
#
# danach einmal: docker compose up -d
# ---------------------------------------------------------------------------

services:
  kiara:
    build: .
    restart: unless-stopped
    environment:
      KIARA_SECURE_COOKIES: "true"
    volumes:
      - kiara-data:/data

  # Zweite, unabhängige Instanz (nur mit Profil "zweitfirma" aktiv).
  kiara2:
    build: .
    restart: unless-stopped
    profiles: ["zweitfirma"]
    environment:
      KIARA_SECURE_COOKIES: "true"
    volumes:
      - kiara2-data:/data

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      KIARA_DOMAIN: ${KIARA_DOMAIN:-localhost}
      KIARA_DOMAIN2: ${KIARA_DOMAIN2:-}
    volumes:
      - ./${CADDYFILE:-Caddyfile}:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - kiara

volumes:
  kiara-data:
  kiara2-data:
  caddy-data:
  caddy-config:
