<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Kiara{% endblock %} · Kiara</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<header class="topbar">
    <a class="brand" href="/">📎 Kiara</a>
    {% if request.cookies.get('kiara_session') %}
    <nav>
        <a href="/" class="{{ 'active' if request.url.path == '/' else '' }}">Übersicht</a>
        <a href="/accounts" class="{{ 'active' if request.url.path.startswith('/accounts') else '' }}">Konten</a>
        <a href="/attachments" class="{{ 'active' if request.url.path.startswith('/attachments') else '' }}">Belege</a>
        <a href="/bank" class="{{ 'active' if request.url.path.startswith('/bank') else '' }}">Gegenkontrolle</a>
        <a href="/settings" class="{{ 'active' if request.url.path.startswith('/settings') else '' }}">Einstellungen</a>
    </nav>
    <form method="post" action="/logout" class="logout-form">
        <button type="submit" class="btn small ghost">Abmelden</button>
    </form>
    {% endif %}
</header>

<main class="container">
    {% if msg %}<div class="flash success">{{ msg }}</div>{% endif %}
    {% if error %}<div class="flash error">{{ error }}</div>{% endif %}
    {% block content %}{% endblock %}
</main>

<footer class="footer">
    Kiara – Belegarchiv &amp; Buchhaltungs-Gegenkontrolle
</footer>
<script src="/static/app.js"></script>
</body>
</html>
