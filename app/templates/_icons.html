{#- Zentrales Icon-Set (Linien-Stil, passend zur Navigation).
    Verwendung:  {% from "_icons.html" import icon %}  ...  {{ icon('search') }}  -#}
{% macro icon(name, cls='icon') -%}
<svg class="{{ cls }}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
{%- if name == 'search' -%}<circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/>
{%- elif name == 'lock' -%}<rect x="4" y="11" width="16" height="9" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/>
{%- elif name == 'user' -%}<circle cx="12" cy="8" r="4"/><path d="M4 21c1.5-4 4.5-6 8-6s6.5 2 8 6"/>
{%- elif name == 'users' -%}<circle cx="9" cy="8" r="3.5"/><path d="M2.5 20c1.2-3.2 3.6-5 6.5-5s5.3 1.8 6.5 5"/><circle cx="17" cy="9" r="2.5"/><path d="M16.5 15.5c2.3.3 4 1.8 5 4.5"/>
{%- elif name == 'key' -%}<circle cx="8" cy="15" r="4"/><path d="m11 12 9-9M17 6l3 3M14 9l2 2"/>
{%- elif name == 'wrench' -%}<path d="M14.7 6.3a4.5 4.5 0 0 0-6 5.6L3 17.6V21h3.4l5.7-5.7a4.5 4.5 0 0 0 5.6-6l-3 3-2.8-.7-.7-2.8z"/>
{%- elif name == 'scan' -%}<path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2"/><path d="M7 12h10"/>
{%- elif name == 'cloud' -%}<path d="M7 18a4.5 4.5 0 1 1 .6-8.9 6 6 0 0 1 11.4 1.9A3.5 3.5 0 0 1 18.5 18z"/>
{%- elif name == 'download' -%}<path d="M12 3v12M7 10l5 5 5-5"/><path d="M4 21h16"/>
{%- elif name == 'upload' -%}<path d="M12 16V4M7 9l5-5 5 5"/><path d="M4 21h16"/>
{%- elif name == 'check' -%}<path d="m4.5 12.5 5 5 10-11"/>
{%- elif name == 'x' -%}<path d="m6 6 12 12M18 6 6 18"/>
{%- elif name == 'paperclip' -%}<path d="m20 11-8.5 8.5a5 5 0 0 1-7-7L13 4a3.5 3.5 0 0 1 5 5l-8.5 8.5a2 2 0 0 1-3-3L15 6"/>
{%- endif -%}
</svg>
{%- endmacro %}
