{% extends "base.html" %}
{% block title %}Anmelden{% endblock %}
{% from "_icons.html" import icon %}
{% block content %}
<div class="auth-box card">
    <h1>{{ icon('lock', 'h-icon') }}Anmelden</h1>
    <form method="post" action="/login" class="form-grid single">
        <label>E-Mail-Adresse
            <input type="text" name="email" autofocus required
                   autocomplete="username" placeholder="name@firma.de">
        </label>
        <label>Passwort
            <input type="password" name="password" required autocomplete="current-password">
        </label>
        <div class="form-actions">
            <button type="submit" class="btn primary">Anmelden</button>
        </div>
    </form>
    <p class="muted small">
        Kein Konto? Benutzerkonten legt der Administrator unter
        Einstellungen an – es gibt keine Selbstregistrierung.
    </p>
</div>
{% endblock %}
